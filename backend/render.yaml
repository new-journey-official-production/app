# Prefer app/render.yaml at repo root for Blueprint sync. This file mirrors the same service for reference.
services:
  - type: web
    name: newjourney-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseUrl
        sync: false
      - key: JwtSecret
        sync: false
      - key: CorsOrigins
        sync: false
      - key: AdminEmail
        sync: false
      - key: AdminPassword
        sync: false
      - key: SupabaseUrl
        sync: false
      - key: SupabasePublishableKey
        sync: false
