# Render Blueprint — repo root (app/). Sync via Dashboard → Blueprints, or deploy manually with rootDir=backend.
services:
  - type: web
    name: newjourney-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseUrl
        sync: false
      - key: JwtSecret
        sync: false
      - key: CorsOrigins
        sync: false
      - key: AdminEmail
        sync: false
      - key: AdminPassword
        sync: false
      - key: SupabaseUrl
        sync: false
      - key: SupabasePublishableKey
        sync: false
